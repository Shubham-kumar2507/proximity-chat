name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-scan-dependencies:
    runs-on: ubuntu-latest
    name: Security Scan - Dependencies
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Audit Backend Dependencies
        run: |
          cd backend
          npm audit --audit-level=high || true
      
      - name: Audit Mobile Dependencies
        run: |
          cd mobile
          npm audit --audit-level=high || true

  build-containers:
    runs-on: ubuntu-latest
    name: Build & Push Docker Containers
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Extract metadata for web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: mobile/Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan-containers:
    runs-on: ubuntu-latest
    name: Security Scan - Containers
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image locally
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: proximity-chat-backend:scan
      
      - name: Build web image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: mobile/Dockerfile.web
          push: false
          load: true
          tags: proximity-chat-web:scan
      
      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'proximity-chat-backend:scan'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'HIGH,CRITICAL'
      
      - name: Run Trivy vulnerability scanner on web
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'proximity-chat-web:scan'
          format: 'sarif'
          output: 'trivy-web.sarif'
          severity: 'HIGH,CRITICAL'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: proximitychat
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
        options: >-
          --health-cmd "pg_isready -U postgres -d proximitychat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install
      
      - name: Run Tests
        run: |
          cd backend
          npm test || true
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/proximitychat
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [security-scan-dependencies, security-scan-containers, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if deployment secrets are configured
        id: check-secrets
        run: |
          echo "has_secrets=false" >> $GITHUB_OUTPUT
          if [[ ! -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]] || [[ ! -z "${{ secrets.RAILWAY_TOKEN }}" ]] || [[ ! -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]] || [[ ! -z "${{ secrets.HEROKU_API_KEY }}" ]]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Deploy to Render (Optional)
        if: secrets.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }} \
            -H "Content-Type: application/json" \
            -d '{"buildId": "${{ github.run_id }}"}'
      
      - name: Deploy to Railway (Optional)
        if: secrets.RAILWAY_TOKEN != ''
        run: |
          npm install -g @railway/cli
          railway link --projectId ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      
      - name: Deploy to AWS ECS (Optional)
        if: secrets.AWS_ACCESS_KEY_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
      
      - name: Update ECS Service
        if: secrets.AWS_ACCESS_KEY_ID != ''
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.AWS_ECS_CLUSTER }} \
            --service ${{ secrets.AWS_ECS_SERVICE }} \
            --force-new-deployment
      
      - name: Deploy to Heroku (Optional)
        if: secrets.HEROKU_API_KEY != ''
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: "backend"
      
      - name: Deployment Info
        run: |
          if [[ "${{ steps.check-secrets.outputs.has_secrets }}" == "true" ]]; then
            echo "✅ Deployment secrets configured - services deployed"
          else
            echo "ℹ️ No deployment secrets configured - skipping deployment"
            echo "To enable automatic deployment, add secrets in GitHub repository settings"
          fi

  notify-slack:
    runs-on: ubuntu-latest
    name: Notify Slack
    needs: [security-scan-dependencies, build-containers, security-scan-containers, test-backend]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.test-backend.result }}" == "success" ]] && [[ "${{ needs.build-containers.result }}" == "success" ]]; then
            echo "STATUS=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "COLOR=good" >> $GITHUB_OUTPUT
          else
            echo "STATUS=❌ FAILED" >> $GITHUB_OUTPUT
            echo "COLOR=danger" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        if: secrets.SLACK_WEBHOOK != ''
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.COLOR }}",
                  "title": "Proximity Chat - CI/CD Pipeline",
                  "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "text": "${{ steps.status.outputs.STATUS }}",
                  "fields": [
                    {
                      "title": "Branch",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "Author",
                      "value": "${{ github.actor }}",
                      "short": true
                    },
                    {
                      "title": "Message",
                      "value": "${{ github.event.head_commit.message }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
